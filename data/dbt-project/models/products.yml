
models:
  - name: products
    meta:
      label: Products
      joins:
        - join: providers
          sql_on: ${products.provider_id} = ${providers.provider_id}
      group_details:
        product_info:
          description: Fields describing product details.
          label: Product Info
        provider_info:
          description: Fields related to the product's provider.
          label: Provider Info
    columns:
      - name: product_id
        description: Unique identifier for the product.
        meta:
          dimension:
            type: string
          metrics:
            number_of_products:
              description: Total number of products.
              type: count
            count_unique_products:
              description: Number of unique products
              type: count_distinct
      - name: product_name
        description: Name of the product.
        meta:
          dimension:
            type: string
          additional_dimensions:
            product_name_upper:
              description: Uppercased product name.
              type: string
              sql: UPPER(${product_name})
              groups:
                - product_info
            product_composed_name:
              description: Composed product name which includes provider name.
              type: string
              sql: ${providers.provider_name} || ' - ' || ${product_name}
            product_name_group:
              description: Products names
              type: string
              sql: GROUP_CONCAT(${product_name})
      - name: product_category
        description: Category of the product.
        meta:
          dimension:
            type: string
          metrics:
            count_by_category:
              description: Number of products in each category.
              type: count
      - name: provider_id
        description: Foreign key referencing the product's provider.
        meta:
          dimension:
            type: string
